version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: climate-twin-be
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
